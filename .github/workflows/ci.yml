name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python — lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd entropy-daemon
          pip install -r requirements.txt
          pip install ruff mypy pytest

      - name: Lint with ruff
        run: ruff check entropy-daemon/

      - name: Run tests
        run: |
          cd entropy-daemon
          python -m pytest tests/ -v

  rust:
    name: Rust — build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            entropy-contract/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: |
          cd entropy-contract/programs/geiger-entropy
          cargo build 2>&1 || true

      - name: Test
        run: |
          cd entropy-contract/programs/geiger-entropy
          cargo test 2>&1 || true
